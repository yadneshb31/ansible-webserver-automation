<!DOCTYPE html>
<html>
<head>
    <title>Bhidu DevOps Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
        }
        .container {
            margin-top: 50px;
        }
        input, button {
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }
        button {
            background-color: #ff9800;
            color: white;
            cursor: pointer;
        }
        .card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            margin: 20px;
            border-radius: 10px;
            display: inline-block;
        }
    </style>
</head>

<body>

    <h1>Bhidu DevOps Live Dashboard</h1>
    <h1>Phase 6 Idempotency Test</h1>
    <p>Powered by Ansible Automation</p>

    <div class="container">

        <!-- Greeting -->
        <div class="card">
            <h3>👤 Greeting Generator</h3>
            <input type="text" id="name" placeholder="Enter your name">
            <button onclick="greet()">Greet Me</button>
            <p id="greetOutput"></p>
        </div>

        <!-- Calculator -->
        <div class="card">
            <h3>🧮 Simple Calculator</h3>
            <input type="number" id="num1" placeholder="Number 1">
            <input type="number" id="num2" placeholder="Number 2">
            <button onclick="add()">Add</button>
            <button onclick="multiply()">Multiply</button>
            <p id="calcOutput"></p>
        </div>

        <!-- Background Color Changer -->
        <div class="card">
		<h3>Change Background</h3>
            <button onclick="changeColor()">Change Color</button>
        </div>

        <!-- Live Time -->
        <div class="card">
            <h3>Current Time</h3>
            <p id="time"></p>
        </div>

    </div>

    <script>
        function greet() {
            let name = document.getElementById("name").value;
            document.getElementById("greetOutput").innerText = "Hello " + name + " 😏";
        }

        function add() {
            let n1 = parseInt(document.getElementById("num1").value);
            let n2 = parseInt(document.getElementById("num2").value);
            document.getElementById("calcOutput").innerText = "Result: " + (n1 + n2);
        }

        function multiply() {
            let n1 = parseInt(document.getElementById("num1").value);
            let n2 = parseInt(document.getElementById("num2").value);
            document.getElementById("calcOutput").innerText = "Result: " + (n1 * n2);
        }

        function changeColor() {
            document.body.style.background = "linear-gradient(135deg, #" + Math.floor(Math.random()*16777215).toString(16) + ", #000)";
        }

        function updateTime() {
            let now = new Date();
            document.getElementById("time").innerText = now.toLocaleTimeString();
        }

        setInterval(updateTime, 1000);
    </script>

</body>
</html>
